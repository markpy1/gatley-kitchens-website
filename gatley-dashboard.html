<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gatley Kitchens — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1714;font-family:'Jost',sans-serif;color:#faf6f0;font-size:13px}
button{cursor:pointer;font-family:'Jost',sans-serif}
input,select,textarea{font-family:'Jost',sans-serif}

/* GATE */
#gate{position:fixed;inset:0;background:#1a1714;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:9999}
#gate h2{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:400;color:#faf6f0}
#gate h2 span{color:#e8b96a;font-style:italic}
#gate p{font-size:11px;color:#8a7d72;letter-spacing:0.05em}
#gate input{padding:11px 18px;border:1px solid #3a3430;background:#221f1b;color:#faf6f0;outline:none;width:250px;text-align:center;letter-spacing:0.1em;font-size:14px}
#gate input:focus{border-color:#c8922a}
#gate .gbtn{padding:10px 0;background:#c8922a;border:none;color:#1a1714;width:250px;font-size:10px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase}
#gate .gbtn:hover{background:#e8b96a}
#gate .gerr{font-size:10px;color:#e07070;min-height:14px}

/* APP */
#app{display:none;min-height:100vh}

/* TOPBAR */
#topbar{background:#221f1b;border-bottom:1px solid #3a3430;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
#topbar .logo{font-family:'Cormorant Garamond',serif;font-size:18px;color:#faf6f0}
#topbar .logo em{color:#e8b96a;font-style:italic}
#topbar .tabs{display:flex;gap:5px}
.tab-btn{font-size:10px;font-weight:600;letter-spacing:0.13em;text-transform:uppercase;padding:5px 12px;border:1px solid #3a3430;background:transparent;color:#8a7d72}
.tab-btn.active{background:#c8922a;border-color:#c8922a;color:#1a1714}
#syncMsg{font-size:10px;color:#6ec87a;margin-left:8px}

/* CONTENT */
.pane{display:none;padding:14px 12px}
.pane.active{display:block}

/* STAT TILES */
.tiles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tile{background:#221f1b;border:1px solid #3a3430;padding:7px 12px;text-align:center;min-width:70px}
.tile .tv{font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1;margin-bottom:2px}
.tile .tl{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:#8a7d72}

/* FILTER BAR */
.filterbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.flt-btn{font-size:9px;font-weight:600;letter-spacing:0.11em;text-transform:uppercase;padding:4px 9px;border:1px solid #3a3430;background:transparent;color:#8a7d72}
.flt-btn.active{color:#faf6f0}
#lSearch{margin-left:auto;padding:4px 9px;border:1px solid #3a3430;background:#221f1b;color:#faf6f0;outline:none;font-size:11px;width:110px}

/* KANBAN GRID */
.kboard{display:grid;gap:10px;align-items:start}
.kboard.cols4{grid-template-columns:repeat(4,1fr)}
.kboard.cols5{grid-template-columns:repeat(5,1fr)}
.kcol-head{display:flex;justify-content:space-between;align-items:center;padding-bottom:6px;margin-bottom:10px;border-bottom:2px solid}
.kcol-head .khl{font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase}
.kcol-head .khc{font-family:'Cormorant Garamond',serif;font-size:17px}
.kempty{font-size:10px;color:#8a7d72;font-style:italic;text-align:center;padding:12px 0}

/* CARDS */
.card{padding:9px;margin-bottom:7px;cursor:pointer;border:1px solid}
.card .cname{font-family:'Cormorant Garamond',serif;font-size:13px;color:#faf6f0;line-height:1.2;margin-bottom:3px}
.card .cval{font-size:11px;font-weight:600;margin-bottom:2px}
.card .cprofit{font-size:10px;color:#6ec87a;font-weight:500;margin-bottom:2px}
.card .cinv{font-size:9px;color:#8a7d72;margin-bottom:2px}
.card .ctags{display:flex;gap:3px;margin-bottom:3px;flex-wrap:wrap}
.tag-a{font-size:8px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:2px 5px;border:1px solid #c8922a;color:#e8b96a}
.tag-m{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;padding:2px 5px;border:1px solid #3a3430;color:#8a7d72}
.tag-auto{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:inherit;opacity:0.6}
.card .cdate{font-size:9px;color:#8a7d72}
.card .clost{font-size:9px;opacity:0.8}
.card .cnotes{font-size:10px;color:#8a7d72;line-height:1.5;font-style:italic;border-left:2px solid #3a3430;padding-left:6px;margin:5px 0}
.card .cactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:6px}
.card .ctap{font-size:7px;color:#8a7d72;opacity:0.4;margin-top:2px;letter-spacing:0.1em;text-transform:uppercase}
.card .cpri{font-size:8px;padding:2px 4px;border:1px solid;display:inline-block;margin-bottom:3px}
.card .cdue{font-size:9px;margin-top:2px}

.act-btn{font-size:9px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border:1px solid;background:transparent;cursor:pointer}
.add-btn{width:100%;padding:7px;border:1px dashed #3a3430;background:transparent;color:#8a7d72;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;margin-top:4px}
.add-btn:hover{border-color:#8a7d72}

/* INFO BAR */
.infobar{background:#221f1b;border:1px solid #3a3430;padding:8px 12px;margin-bottom:14px;font-size:10px;color:#8a7d72;line-height:1.7}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:#2a2520;border:1px solid #3a3430;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:20px}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:18px;color:#faf6f0;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.form-field label{display:block;font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:#8a7d72;margin-bottom:4px}
.form-field input,.form-field select,.form-field textarea{width:100%;padding:6px 9px;border:1px solid #3a3430;background:#1a1714;color:#faf6f0;outline:none;font-size:12px;font-weight:300}
.form-field textarea{resize:vertical}
.modal-footer{display:flex;gap:7px;margin-top:14px;justify-content:flex-end}
.rev-section{margin-top:14px;padding:12px;background:#1f1c19;border:1px solid #2e7a3a}
.rev-section .rev-label{font-size:9px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:#6ec87a;margin-bottom:10px}
.rev-hint{font-size:9px;color:#8a7d72;margin-top:8px;line-height:1.5}

/* REVENUE TAB */
.rev-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.rev-top h2{font-family:'Cormorant Garamond',serif;font-size:18px;color:#faf6f0}
.yr-btn{font-size:10px;font-weight:600;letter-spacing:0.12em;padding:4px 11px;border:1px solid #3a3430;background:transparent;color:#8a7d72;cursor:pointer}
.yr-btn.active{background:#6ec87a;border-color:#6ec87a;color:#1a1714}
.rev-hint-top{margin-left:auto;font-size:9px;color:#8a7d72}

.rev-tiles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.rev-tile{background:#221f1b;border:1px solid #3a3430;padding:10px 14px;flex:1;min-width:100px}
.rev-tile .rtv{font-family:'Cormorant Garamond',serif;font-size:20px;line-height:1;margin-bottom:3px}
.rev-tile .rtl{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:#8a7d72}

.chart-wrap{background:#221f1b;border:1px solid #3a3430;padding:14px;margin-bottom:16px}
.chart-label{font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:#8a7d72;margin-bottom:12px}
.bars{display:flex;gap:3px;align-items:flex-end;height:120px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-val{font-size:7px;color:#6ec87a;text-align:center;line-height:1.2;min-height:12px}
.bar-fill{width:100%;border-radius:2px;min-height:2px;transition:height 0.3s}
.bar-mon{font-size:8px;letter-spacing:0.04em}

.rev-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rev-box{background:#221f1b;border:1px solid #3a3430;padding:14px}
.rev-box h4{font-size:9px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:#8a7d72;margin-bottom:12px}
.rev-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #2a2520}
.rev-row .rn{font-size:11px;color:#faf6f0}
.rev-row .rn small{display:block;font-size:9px;color:#8a7d72}
.rev-row .rp{font-size:12px;color:#6ec87a;font-weight:500}
.rev-row .rv{font-size:10px;color:#8a7d72}
.rev-total{display:flex;justify-content:space-between;padding:10px 0 0;margin-top:4px}
.rev-total span{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#8a7d72}
.rev-total strong{font-family:'Cormorant Garamond',serif;font-size:15px;color:#6ec87a}
.rev-empty{font-size:11px;color:#8a7d72;font-style:italic}

@media(max-width:700px){
  .kboard.cols4{grid-template-columns:repeat(2,1fr)}
  .kboard.cols5{grid-template-columns:repeat(2,1fr)}
  .rev-split{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:420px){
  .kboard.cols4,.kboard.cols5{grid-template-columns:1fr}
  .rev-tiles{flex-direction:column}
}
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <h2>Gatley <span>Kitchens</span></h2>
  <p>Dashboard — private access</p>
  <input type="password" id="pwInput" placeholder="Password" />
  <button class="gbtn" id="unlockBtn">Enter</button>
  <div class="gerr" id="pwErr"></div>
</div>

<!-- APP -->
<div id="app">
  <div id="topbar">
    <div>
      <span class="logo">Gatley <em>Kitchens</em></span>
      <span id="syncMsg"></span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="pipeline">Pipeline</button>
      <button class="tab-btn" data-tab="jobs">Jobs</button>
      <button class="tab-btn" data-tab="revenue">Revenue</button>
    </div>
  </div>

  <!-- PIPELINE PANE -->
  <div class="pane active" id="pane-pipeline">
    <div class="tiles" id="pipelineTiles"></div>
    <div class="filterbar" id="filterBar"></div>
    <div class="kboard cols4" id="pipelineBoard"></div>
  </div>

  <!-- JOBS PANE -->
  <div class="pane" id="pane-jobs">
    <div class="infobar" id="jobsInfo"></div>
    <div class="tiles" id="jobsTiles"></div>
    <div class="kboard cols5" id="jobsBoard"></div>
  </div>

  <!-- REVENUE PANE -->
  <div class="pane" id="pane-revenue">
    <div class="rev-top">
      <h2>Monthly Profit Tracker</h2>
      <div id="yearBtns"></div>
      <span class="rev-hint-top">Edit a job card → add Final Profit + Invoice Date</span>
    </div>
    <div class="rev-tiles" id="revTiles"></div>
    <div class="chart-wrap">
      <div class="chart-label" id="chartLabel">Monthly Profit</div>
      <div class="bars" id="barChart"></div>
    </div>
    <div class="rev-split">
      <div class="rev-box">
        <h4 id="cumLabel">Cumulative</h4>
        <div id="cumList"></div>
      </div>
      <div class="rev-box">
        <h4 id="jobsLogLabel">Logged Jobs</h4>
        <div id="jobsList"></div>
      </div>
    </div>
  </div>
</div>

<!-- LEAD MODAL -->
<div class="modal-bg" id="leadModal" style="display:none">
  <div class="modal">
    <h3 id="leadModalTitle">Lead</h3>
    <div class="form-grid">
      <div class="form-field"><label>Name</label><input id="lf_name" type="text"></div>
      <div class="form-field"><label>Date</label><input id="lf_date" type="date"></div>
      <div class="form-field"><label>Source</label><select id="lf_source"></select></div>
      <div class="form-field"><label>Status</label><select id="lf_status"></select></div>
      <div class="form-field"><label>Value £</label><input id="lf_value" type="number"></div>
      <div class="form-field"><label>Pre-qualified?</label><select id="lf_pq"><option>No</option><option>Yes</option><option>Partial</option></select></div>
    </div>
    <div class="form-field" style="margin-bottom:9px"><label>Lost Reason</label><input id="lf_lost" type="text"></div>
    <div class="form-field"><label>Notes</label><textarea id="lf_notes" rows="3"></textarea></div>
    <div class="modal-footer">
      <button class="act-btn" id="delLeadBtn" style="border-color:#8b2e2e;color:#e07070;display:none">Delete</button>
      <button class="act-btn" style="border-color:#3a3430;color:#8a7d72" onclick="closeLeadModal()">Cancel</button>
      <button class="act-btn" style="border-color:#c8922a;background:#c8922a;color:#1a1714;padding:5px 14px" onclick="saveLeadModal()">Save</button>
    </div>
  </div>
</div>

<!-- JOB MODAL -->
<div class="modal-bg" id="jobModal" style="display:none">
  <div class="modal">
    <h3 id="jobModalTitle">Job</h3>
    <div class="form-grid">
      <div class="form-field"><label>Job / Customer</label><input id="jf_name" type="text"></div>
      <div class="form-field"><label>Column</label><select id="jf_col"></select></div>
      <div class="form-field"><label>Priority</label><select id="jf_pri"><option>High</option><option>Normal</option><option>Low</option></select></div>
      <div class="form-field"><label>Due Date</label><input id="jf_due" type="date"></div>
      <div class="form-field"><label>Job Value £</label><input id="jf_val" type="number"></div>
    </div>
    <div class="rev-section">
      <div class="rev-label">Revenue Tracking</div>
      <div class="form-grid">
        <div class="form-field"><label>Final Profit £</label><input id="jf_profit" type="number" placeholder="e.g. 3200"></div>
        <div class="form-field"><label>Job Invoiced Date</label><input id="jf_invdate" type="date"></div>
      </div>
      <div class="rev-hint">Fill both fields to include this job in the Revenue tab.</div>
    </div>
    <div class="form-field" style="margin-top:9px"><label>Notes</label><textarea id="jf_notes" rows="3"></textarea></div>
    <div class="modal-footer">
      <button class="act-btn" id="delJobBtn" style="border-color:#8b2e2e;color:#e07070;display:none">Delete</button>
      <button class="act-btn" style="border-color:#3a3430;color:#8a7d72" onclick="closeJobModal()">Cancel</button>
      <button class="act-btn" style="border-color:#c8922a;background:#c8922a;color:#1a1714;padding:5px 14px" onclick="saveJobModal()">Save</button>
    </div>
  </div>
</div>

// ============================================================
// STATE
// ============================================================
var db = {leads:[], manualJobs:[], nextLeadId:36, nextJobId:1};
var activeTab = 'pipeline';
var lFilter = 'all', lSearch = '';
var expandedL = null, expandedJ = null;
var editingLead = null, editingJob = null;
var revYear = new Date().getFullYear();

// ============================================================
// UTILS
// ============================================================
function fmtMoney(v){ return v ? '£'+Number(v).toLocaleString() : '—'; }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); } catch(e){ return d||''; } }
function saveDB(){
  try{ localStorage.setItem(SK, JSON.stringify(db)); showSync('saved ✓'); }
  catch(e){ showSync('error'); }
}
function showSync(m){ var el=document.getElementById('syncMsg'); el.textContent=m; setTimeout(function(){ el.textContent=''; },1500); }
function h(str){ return str ? String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

// ============================================================
// AUTH
// ============================================================
document.getElementById('unlockBtn').onclick = tryUnlock;
document.getElementById('pwInput').onkeydown = function(e){ if(e.key==='Enter') tryUnlock(); };

function tryUnlock(){
  var val = document.getElementById('pwInput').value;
  var hash = btoa(unescape(encodeURIComponent(val)));
  if(hash === AUTH_HASH){
    localStorage.setItem('gk_auth', AUTH_HASH);
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password';
    document.getElementById('pwInput').value = '';
  }
}

window.addEventListener('DOMContentLoaded', function(){
  if(localStorage.getItem('gk_auth') === AUTH_HASH){
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }
  document.getElementById('pwInput').focus();
});

// ============================================================
// INIT
// ============================================================
function initApp(){
  var stored = localStorage.getItem(SK);
  if(stored){
    try{
      var d = JSON.parse(stored);
      db.leads      = d.leads      || INIT_LEADS;
      db.manualJobs = d.manualJobs || [];
      db.nextLeadId = d.nextLeadId || 36;
      db.nextJobId  = d.nextJobId  || 1;
    } catch(e){ db.leads = INIT_LEADS; }
  } else {
    db.leads = INIT_LEADS;
  }

  // Populate selects
  var srcSel = document.getElementById('lf_source');
  SOURCES.forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=s; srcSel.appendChild(o); });
  var stSel = document.getElementById('lf_status');
  P_ST.forEach(function(s){ var o=document.createElement('option'); o.value=s; o.textContent=P_LBL[s]; stSel.appendChild(o); });
  var jcSel = document.getElementById('jf_col');
  J_COLS.forEach(function(c){ var o=document.createElement('option'); o.value=c; o.textContent=J_LBL[c]; jcSel.appendChild(o); });

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.onclick = function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.pane').forEach(function(p){ p.classList.remove('active'); });
      document.getElementById('pane-'+activeTab).classList.add('active');
      render();
    };
  });

  // Filter bar
  buildFilterBar();
  render();
}

// ============================================================
// RENDER DISPATCH
// ============================================================
function render(){
  renderPipeline();
  renderJobs();
  renderRevenue();
}

// ============================================================
// PIPELINE
// ============================================================
function buildFilterBar(){
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  var filters = [['all','All'],['pending','Pending'],['not_started','Not Started'],['won','Won'],['lost','Lost']];
  filters.forEach(function(f){
    var btn = document.createElement('button');
    btn.className = 'flt-btn' + (lFilter===f[0]?' active':'');
    btn.textContent = f[1];
    if(lFilter===f[0] && f[0]!=='all'){
      btn.style.borderColor = P_BDR[f[0]]||'#c8922a';
      btn.style.background  = P_BDR[f[0]]||'#c8922a';
    }
    btn.onclick = function(){ lFilter=f[0]; expandedL=null; buildFilterBar(); renderPipeline(); };
    bar.appendChild(btn);
  });
  var inp = document.createElement('input');
  inp.id='lSearch'; inp.placeholder='Search...'; inp.value=lSearch;
  inp.oninput = function(){ lSearch=this.value; renderPipeline(); };
  bar.appendChild(inp);
}

function renderPipeline(){
  var counts = {pending:0,not_started:0,won:0,lost:0,activeVal:0};
  db.leads.forEach(function(l){
    counts[l.status] = (counts[l.status]||0)+1;
    if(l.status==='pending'||l.status==='not_started') counts.activeVal += Number(l.value)||0;
  });

  // Tiles
  var tileData = [
    ['Pending',counts.pending,'#e8b96a'],
    ['Not Started',counts.not_started,'#7ab8e8'],
    ['Won',counts.won,'#6ec87a'],
    ['Lost',counts.lost,'#e07070'],
    ['Active £','£'+counts.activeVal.toLocaleString(),'#e8b96a']
  ];
  var tilesEl = document.getElementById('pipelineTiles');
  tilesEl.innerHTML = '';
  tileData.forEach(function(t){
    var div = document.createElement('div'); div.className='tile';
    div.innerHTML = '<div class="tv" style="color:'+t[2]+'">'+t[1]+'</div><div class="tl">'+t[0]+'</div>';
    tilesEl.appendChild(div);
  });

  // Board
  var board = document.getElementById('pipelineBoard');
  board.innerHTML = '';
  var filtered = db.leads.filter(function(l){
    return (lFilter==='all'||l.status===lFilter) && (!lSearch||l.name.toLowerCase().includes(lSearch.toLowerCase()));
  });

  P_ST.forEach(function(col){
    var col_leads = filtered.filter(function(l){ return l.status===col; });
    var tc=P_COL[col],bc=P_BDR[col],bg=P_BG[col];
    var colEl = document.createElement('div');

    var head = '<div class="kcol-head" style="border-color:'+bc+'"><span class="khl" style="color:'+tc+'">'+P_LBL[col]+'</span><span class="khc" style="color:'+tc+'">'+col_leads.length+'</span></div>';
    var cards = col_leads.length===0 ? '<div class="kempty">None</div>' : '';

    col_leads.forEach(function(l){
      var isExp = expandedL === l.id;
      var actBtns = '';
      if(isExp){
        actBtns += '<button class="act-btn" style="border-color:#c8922a;color:#c8922a" onclick="openLeadModal('+l.id+',event)">Edit</button>';
        P_ST.filter(function(s){ return s!==col; }).forEach(function(s){
          actBtns += '<button class="act-btn" style="border-color:'+P_BDR[s]+';color:'+P_COL[s]+'" onclick="quickStatus('+l.id+',\''+s+'\',event)">→'+P_LBL[s]+'</button>';
        });
      }
      cards += '<div class="card" style="background:'+bg+';border-color:'+bc+'" onclick="toggleLead('+l.id+')">'
        +'<div style="display:flex;justify-content:space-between;gap:4px;margin-bottom:3px">'
        +'<div class="cname">'+h(l.name)+'</div>'
        +'<div style="text-align:right;flex-shrink:0">'
        +(l.value?'<div class="cval" style="color:'+tc+'">'+fmtMoney(l.value)+'</div>':'')
        +(l.value>0?'<div style="font-size:8px;color:#8a7d72">~'+fmtMoney(Math.round(l.value*0.5))+'</div>':'')
        +'</div></div>'
        +'<div class="ctags"><span class="tag-a">'+h(l.source)+'</span><span class="tag-m">PQ:'+h(l.pq)+'</span></div>'
        +'<div class="cdate">'+fmtDate(l.date)+'</div>'
        +(l.lostReason?'<div class="clost" style="color:'+tc+'">↳ '+h(l.lostReason)+'</div>':'')
        +(isExp&&l.notes?'<div class="cnotes">'+h(l.notes)+'</div>':'')
        +(isExp&&actBtns?'<div class="cactions">'+actBtns+'</div>':'')
        +(!isExp?'<div class="ctap">tap</div>':'')
        +'</div>';
    });

    var addBtnHtml = '<button class="add-btn" onclick="openLeadModal(0,event,\''+col+'\')">+ Add</button>';
    colEl.innerHTML = head + cards + addBtnHtml;
    board.appendChild(colEl);
  });
}

function toggleLead(id){ expandedL = expandedL===id ? null : id; renderPipeline(); }
function quickStatus(id, st, e){ e.stopPropagation(); db.leads = db.leads.map(function(l){ return l.id===id ? Object.assign({},l,{status:st}) : l; }); saveDB(); expandedL=null; renderPipeline(); }

// ============================================================
// JOBS
// ============================================================
function getItemsFor(col){
  var pinned = {};
  db.manualJobs.forEach(function(j){ if(j.leadId) pinned[j.leadId]=true; });
  var m = db.manualJobs.filter(function(j){ return j.column===col; });
  if(col==='quotes') return db.leads.filter(function(l){ return l.status==='not_started'&&!pinned[l.id]; }).map(function(l){ return Object.assign({},l,{_auto:true}); }).concat(m);
  if(col==='orders') return db.leads.filter(function(l){ return l.status==='won'&&!pinned[l.id]; }).map(function(l){ return Object.assign({},l,{_auto:true}); }).concat(m);
  return m;
}

function renderJobs(){
  // Info bar
  document.getElementById('jobsInfo').innerHTML =
    '<span style="color:#7ab8e8">Not Started</span> → <span style="color:'+J_COL.quotes+'">Quotes</span> &nbsp;·&nbsp; '
    +'<span style="color:#6ec87a">Won</span> → <span style="color:'+J_COL.orders+'">Orders</span> &nbsp;·&nbsp; '
    +'Tap card to move columns &nbsp;·&nbsp; Add profit + invoice date to track in <span style="color:#6ec87a">Revenue</span>';

  // Tiles
  var tilesEl = document.getElementById('jobsTiles');
  tilesEl.innerHTML = '';
  J_COLS.forEach(function(col){
    var items = getItemsFor(col);
    var div = document.createElement('div'); div.className='tile';
    div.innerHTML = '<div class="tv" style="color:'+J_COL[col]+'">'+items.length+'</div><div class="tl">'+J_LBL[col]+'</div>';
    tilesEl.appendChild(div);
  });

  // Board
  var board = document.getElementById('jobsBoard');
  board.innerHTML = '';

  J_COLS.forEach(function(col){
    var items = getItemsFor(col);
    var tc=J_COL[col], bc=J_BDR[col], bg=J_BG[col];
    var colEl = document.createElement('div');

    var head = '<div class="kcol-head" style="border-color:'+bc+'"><span class="khl" style="color:'+tc+'">'+J_LBL[col]+'</span><span class="khc" style="color:'+tc+'">'+items.length+'</span></div>';
    var cards = items.length===0 ? '<div class="kempty">Nothing</div>' : '';

    items.forEach(function(item){
      var isA = item._auto;
      var cid = isA ? 'a'+item.id : 'j'+item.id;
      var isExp = expandedJ === cid;
      var od = item.dueDate && new Date(item.dueDate) < new Date();
      var hasProfit = item.finalProfit!==''&&item.finalProfit!==undefined&&item.finalProfit!==null&&item.finalProfit!==false;
      var priCol = item.priority==='High'?'#e07070':item.priority==='Low'?'#3a3430':'#8b6a2e';
      var priTxt = item.priority==='High'?'#e07070':item.priority==='Low'?'#8a7d72':'#e8b96a';

      var actBtns = '';
      if(isExp){
        if(isA){
          ['upcoming','snagging','invoices'].forEach(function(c){
            actBtns += '<button class="act-btn" style="border-color:'+J_BDR[c]+';color:'+J_COL[c]+'" onclick="pinJobTo('+item.id+',\''+c+'\',event)">→'+J_LBL[c].split(' ')[0]+'</button>';
          });
        } else {
          actBtns += '<button class="act-btn" style="border-color:#c8922a;color:#c8922a" onclick="openJobModal('+item.id+',event)">Edit</button>';
          J_COLS.filter(function(c){ return c!==col; }).forEach(function(c){
            actBtns += '<button class="act-btn" style="border-color:'+J_BDR[c]+';color:'+J_COL[c]+'" onclick="moveJob('+item.id+',\''+c+'\',event)">→'+J_LBL[c].split(' ')[0]+'</button>';
          });
        }
      }

      cards += '<div class="card" style="background:'+bg+';border-color:'+bc+'" onclick="toggleJob(\''+cid+'\')">'
        +'<div style="display:flex;justify-content:space-between;gap:4px;margin-bottom:2px">'
        +'<div class="cname">'+h(item.name)+'</div>'
        +(isA?'<span class="tag-auto" style="color:'+tc+'">auto</span>':'')
        +'</div>'
        +(item.value>0?'<div class="cval" style="color:'+tc+'">'+fmtMoney(item.value)+'</div>':'')
        +(hasProfit?'<div class="cprofit">Profit: '+fmtMoney(item.finalProfit)+'</div>':'')
        +(item.invoicedDate?'<div class="cinv">Invoiced: '+fmtDate(item.invoicedDate)+'</div>':'')
        +(!isA&&item.priority?'<span class="cpri" style="border-color:'+priCol+';color:'+priTxt+'">'+item.priority+'</span>':'')
        +(item.dueDate?'<div class="cdue" style="color:'+(od?'#e07070':'#8a7d72')+'">Due: '+fmtDate(item.dueDate)+(od?' ⚠':'')+'</div>':'')
        +(isExp&&item.notes?'<div class="cnotes">'+h(item.notes)+'</div>':'')
        +(isExp&&actBtns?'<div class="cactions">'+actBtns+'</div>':'')
        +(!isExp?'<div class="ctap">tap</div>':'')
        +'</div>';
    });

    var canAdd = col==='upcoming'||col==='snagging'||col==='invoices';
    var addBtnHtml = canAdd ? '<button class="add-btn" onclick="openJobModal(0,event,\''+col+'\')">+ Add</button>' : '';
    colEl.innerHTML = head + cards + addBtnHtml;
    board.appendChild(colEl);
  });
}

function toggleJob(cid){ expandedJ = expandedJ===cid ? null : cid; renderJobs(); }

function pinJobTo(leadId, col, e){
  e.stopPropagation();
  var lead = db.leads.find(function(l){ return l.id===leadId; });
  if(!lead) return;
  var nj = {id:db.nextJobId++, leadId:leadId, name:lead.name, column:col, priority:'Normal', dueDate:'', value:lead.value||0, notes:lead.notes||'', finalProfit:'', invoicedDate:''};
  db.manualJobs.push(nj);
  saveDB(); expandedJ=null; renderJobs();
}

function moveJob(id, col, e){
  e.stopPropagation();
  db.manualJobs = db.manualJobs.map(function(j){ return j.id===id ? Object.assign({},j,{column:col}) : j; });
  saveDB(); renderJobs();
}

// ============================================================
// REVENUE
// ============================================================
function renderRevenue(){
  var revJobs = db.manualJobs.filter(function(j){
    return j.invoicedDate && j.finalProfit!==''&&j.finalProfit!==undefined&&j.finalProfit!==null;
  });

  // Year buttons
  var years = [];
  revJobs.forEach(function(j){ var y=new Date(j.invoicedDate).getFullYear(); if(!isNaN(y)&&years.indexOf(y)<0) years.push(y); });
  if(years.indexOf(new Date().getFullYear())<0) years.push(new Date().getFullYear());
  years.sort(function(a,b){ return b-a; });
  if(years.indexOf(revYear)<0) revYear = years[0];

  var yrEl = document.getElementById('yearBtns');
  yrEl.innerHTML = '';
  years.forEach(function(y){
    var btn = document.createElement('button');
    btn.className = 'yr-btn'+(y===revYear?' active':'');
    btn.textContent = y;
    btn.onclick = function(){ revYear=y; renderRevenue(); };
    yrEl.appendChild(btn);
  });

  // Build month data for selected year
  var byMonth = {};
  revJobs.forEach(function(j){
    var d = new Date(j.invoicedDate);
    if(isNaN(d)||d.getFullYear()!==revYear) return;
    var mi = d.getMonth();
    if(!byMonth[mi]) byMonth[mi] = {profit:0, jobs:[]};
    byMonth[mi].profit += Number(j.finalProfit)||0;
    byMonth[mi].jobs.push(j);
  });

  var yearTotal = 0;
  var monthsWithData = 0;
  for(var mi=0;mi<12;mi++){ if(byMonth[mi]){ yearTotal+=byMonth[mi].profit; monthsWithData++; } }

  var yearJobs = revJobs.filter(function(j){ return new Date(j.invoicedDate).getFullYear()===revYear; });

  // Summary tiles
  var gap = Math.max(0, TARGET-yearTotal);
  var avgMonthly = monthsWithData>0 ? Math.round(yearTotal/monthsWithData) : 0;
  var tileData = [
    ['Year Profit', yearTotal>0 ? fmtMoney(yearTotal) : '—', '#6ec87a'],
    ['Jobs Logged', yearJobs.length, '#e8b96a'],
    ['Avg / Month', avgMonthly>0 ? fmtMoney(avgMonthly) : '—', '#7ab8e8'],
    ['Gap to £102k', yearTotal>0 ? (gap>0?fmtMoney(gap):' Target hit!') : 'Log jobs', '#e07070']
  ];
  var tilesEl = document.getElementById('revTiles');
  tilesEl.innerHTML = '';
  tileData.forEach(function(t){
    var div = document.createElement('div'); div.className='rev-tile';
    div.innerHTML = '<div class="rtv" style="color:'+t[2]+'">'+t[1]+'</div><div class="rtl">'+t[0]+'</div>';
    tilesEl.appendChild(div);
  });

  // Bar chart
  document.getElementById('chartLabel').textContent = 'Monthly Profit — '+revYear;
  var maxP = 1;
  for(var mi=0;mi<12;mi++){ if(byMonth[mi]&&byMonth[mi].profit>maxP) maxP=byMonth[mi].profit; }
  var barEl = document.getElementById('barChart');
  barEl.innerHTML = '';
  var now = new Date();
  for(var mi=0;mi<12;mi++){
    var p = byMonth[mi] ? byMonth[mi].profit : 0;
    var barH = p>0 ? Math.max(6,Math.round((p/maxP)*110)) : 2;
    var isCurrent = mi===now.getMonth()&&revYear===now.getFullYear();
    var col = document.createElement('div'); col.className='bar-col';
    col.innerHTML = '<div class="bar-val">'+(p>0?fmtMoney(p).replace('£',''):'')+'</div>'
      +'<div class="bar-fill" style="height:'+barH+'px;background:'+(p>0?'#6ec87a':'#2a2520')+';border:'+(isCurrent?'1px solid #c8922a':'none')+'"></div>'
      +'<div class="bar-mon" style="color:'+(isCurrent?'#c8922a':'#8a7d72')+'">'+MONTHS[mi]+'</div>';
    barEl.appendChild(col);
  }

  // Cumulative list
  document.getElementById('cumLabel').textContent = 'Cumulative — '+revYear;
  var cumEl = document.getElementById('cumList');
  cumEl.innerHTML = '';
  if(monthsWithData===0){
    cumEl.innerHTML = '<div class="rev-empty">No data yet for '+revYear+'. Edit a job card and add Final Profit + Invoice Date.</div>';
  } else {
    var cum = 0;
    for(var mi=0;mi<12;mi++){
      if(!byMonth[mi]) continue;
      cum += byMonth[mi].profit;
      var row = document.createElement('div'); row.className='rev-row';
      row.innerHTML = '<div class="rn">'+MONTHS[mi]+'</div>'
        +'<div style="display:flex;gap:14px;align-items:center">'
        +'<div class="rp">'+fmtMoney(byMonth[mi].profit)+'</div>'
        +'<div class="rv">= '+fmtMoney(cum)+'</div>'
        +'</div>';
      cumEl.appendChild(row);
    }
    var tot = document.createElement('div'); tot.className='rev-total';
    tot.innerHTML = '<span>Total</span><strong>'+fmtMoney(yearTotal)+'</strong>';
    cumEl.appendChild(tot);
  }

  // Jobs list
  document.getElementById('jobsLogLabel').textContent = 'Logged Jobs — '+revYear;
  var jlEl = document.getElementById('jobsList');
  jlEl.innerHTML = '';
  var sortedJobs = yearJobs.slice().sort(function(a,b){ return new Date(b.invoicedDate)-new Date(a.invoicedDate); });
  if(sortedJobs.length===0){
    jlEl.innerHTML = '<div class="rev-empty">No jobs logged for '+revYear+' yet.</div>';
  } else {
    sortedJobs.forEach(function(j){
      var row = document.createElement('div'); row.className='rev-row';
      row.innerHTML = '<div class="rn">'+h(j.name)+'<small>'+fmtDate(j.invoicedDate)+'</small></div>'
        +'<div class="rp">'+fmtMoney(j.finalProfit)+'</div>';
      jlEl.appendChild(row);
    });
  }
}

// ============================================================
// LEAD MODAL
// ============================================================
function openLeadModal(id, e, defaultStatus){
  e&&e.stopPropagation();
  var lead = id ? db.leads.find(function(l){ return l.id===id; }) : null;
  editingLead = lead || null;
  document.getElementById('leadModalTitle').textContent = lead ? 'Edit — '+lead.name : 'Add Lead';
  document.getElementById('lf_name').value  = lead ? lead.name : '';
  document.getElementById('lf_date').value  = lead ? lead.date : new Date().toISOString().split('T')[0];
  document.getElementById('lf_source').value = lead ? lead.source : 'Unknown';
  document.getElementById('lf_status').value = lead ? lead.status : (defaultStatus||'pending');
  document.getElementById('lf_value').value  = lead ? (lead.value||'') : '';
  document.getElementById('lf_pq').value     = lead ? lead.pq : 'No';
  document.getElementById('lf_lost').value   = lead ? lead.lostReason : '';
  document.getElementById('lf_notes').value  = lead ? lead.notes : '';
  document.getElementById('delLeadBtn').style.display = lead ? 'block' : 'none';
  document.getElementById('leadModal').style.display = 'flex';
}

function closeLeadModal(){ document.getElementById('leadModal').style.display='none'; }
document.getElementById('leadModal').onclick = function(e){ if(e.target===this) closeLeadModal(); };

document.getElementById('delLeadBtn').onclick = function(){
  if(!confirm('Delete this lead?')) return;
  db.leads = db.leads.filter(function(l){ return l.id!==editingLead.id; });
  saveDB(); closeLeadModal(); renderPipeline();
};

function saveLeadModal(){
  var d = {
    name:document.getElementById('lf_name').value,
    date:document.getElementById('lf_date').value,
    source:document.getElementById('lf_source').value,
    status:document.getElementById('lf_status').value,
    value:parseFloat(document.getElementById('lf_value').value)||0,
    pq:document.getElementById('lf_pq').value,
    lostReason:document.getElementById('lf_lost').value,
    notes:document.getElementById('lf_notes').value
  };
  if(editingLead){
    db.leads = db.leads.map(function(l){ return l.id===editingLead.id ? Object.assign({},l,d) : l; });
  } else {
    d.id = db.nextLeadId++;
    db.leads.push(d);
  }
  saveDB(); closeLeadModal(); renderPipeline();
}

function openJobModal(id, e, defaultCol){
  e&&e.stopPropagation();
  var job = id ? db.manualJobs.find(function(j){ return j.id===id; }) : null;
  editingJob = job || null;
  document.getElementById('jobModalTitle').textContent = job ? 'Edit — '+job.name : 'Add Job';
  document.getElementById('jf_name').value    = job ? job.name : '';
  document.getElementById('jf_col').value     = job ? job.column : (defaultCol||'upcoming');
  document.getElementById('jf_pri').value     = job ? (job.priority||'Normal') : 'Normal';
  document.getElementById('jf_due').value     = job ? (job.dueDate||'') : '';
  document.getElementById('jf_val').value     = job ? (job.value||'') : '';
  document.getElementById('jf_profit').value  = job ? (job.finalProfit!==undefined&&job.finalProfit!==''?job.finalProfit:'') : '';
  document.getElementById('jf_invdate').value = job ? (job.invoicedDate||'') : '';
  document.getElementById('jf_notes').value   = job ? (job.notes||'') : '';
  document.getElementById('delJobBtn').style.display = job ? 'block' : 'none';
  document.getElementById('jobModal').style.display = 'flex';
}

function closeJobModal(){ document.getElementById('jobModal').style.display='none'; }
document.getElementById('jobModal').onclick = function(e){ if(e.target===this) closeJobModal(); };

document.getElementById('delJobBtn').onclick = function(){
  if(!confirm('Delete this job?')) return;
  db.manualJobs = db.manualJobs.filter(function(j){ return j.id!==editingJob.id; });
  saveDB(); closeJobModal(); renderJobs(); renderRevenue();
};

function saveJobModal(){
  var profVal = document.getElementById('jf_profit').value;
  var d = {
    name:document.getElementById('jf_name').value,
    column:document.getElementById('jf_col').value,
    priority:document.getElementById('jf_pri').value,
    dueDate:document.getElementById('jf_due').value,
    value:parseFloat(document.getElementById('jf_val').value)||0,
    finalProfit: profVal==='' ? '' : (parseFloat(profVal)||0),
    invoicedDate:document.getElementById('jf_invdate').value,
    notes:document.getElementById('jf_notes').value
  };
  if(editingJob){
    db.manualJobs = db.manualJobs.map(function(j){ return j.id===editingJob.id ? Object.assign({},j,d) : j; });
  } else {
    d.id = db.nextJobId++;
    db.manualJobs.push(d);
  }
  saveDB(); closeJobModal(); renderJobs(); renderRevenue();
}
</script>
</body>
</html>
