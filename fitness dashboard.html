<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark's Fitness Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0e8;color:#1a1a1a;min-height:100vh}
.dash{padding:16px;max-width:700px;margin:0 auto}
h1{font-family:Georgia,serif;font-size:1.6rem;font-weight:600;margin-bottom:4px;color:#1a1a1a}
.subtitle{font-size:12px;color:#6b6560;margin-bottom:16px}
.tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid #e8e2d9}
.tab{padding:10px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#6b6560;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab.active{color:#1a1a1a;border-bottom-color:#c8922a;font-weight:500}
.panel{display:none}.panel.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{background:#fff;border:1px solid #e8e2d9;border-radius:8px;padding:12px}
.metric-label{font-size:11px;color:#6b6560;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.metric-val{font-size:19px;font-weight:600;color:#1a1a1a}
.metric-val span{font-size:11px;color:#6b6560;font-weight:400}
.prog-wrap{height:8px;background:#e8e2d9;border-radius:4px;margin:10px 0 4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width 0.4s}
.prog-green{background:#5a7a2a}.prog-amber{background:#c8922a}.prog-red{background:#c0392b}
.remain-row{display:flex;justify-content:space-between;font-size:11px;color:#6b6560;margin-bottom:16px}
.card{background:#fff;border:1px solid #e8e2d9;border-radius:10px;padding:14px;margin-bottom:10px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:#1a1a1a}
.card-sub{font-size:11px;color:#6b6560}
.food-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f0ebe3}
.food-row:last-of-type{border-bottom:none}
.food-name{flex:1;font-size:13px;color:#1a1a1a}
.food-macros{font-size:11px;color:#6b6560;text-align:right;line-height:1.6}
.del-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:15px;padding:2px 6px;border-radius:4px;font-family:inherit}
.del-btn:hover{color:#c0392b;background:#fdf0ee}
.empty{font-size:12px;color:#aaa;padding:8px 0;font-style:italic}
.add-area{margin-top:10px}
.add-row{display:flex;gap:6px;flex-wrap:wrap}
.add-row select,.add-row input{font-size:12px;padding:7px 8px;border:1px solid #e8e2d9;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit}
.add-row select{flex:2;min-width:160px}
.add-btn{background:#1a1a1a;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.add-btn:hover{background:#c8922a}
.quick-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.quick-btn{font-size:11px;padding:4px 9px;border-radius:14px;border:1px solid #e8e2d9;background:#f5f0e8;cursor:pointer;color:#1a1a1a;font-family:inherit}
.quick-btn:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.date-nav button{background:#fff;border:1px solid #e8e2d9;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:14px;color:#1a1a1a;font-family:inherit}
.date-nav button:hover{background:#f5f0e8}
.date-label{flex:1;text-align:center;font-size:14px;font-weight:600;color:#1a1a1a}
.workout-card{background:#fff;border:1px solid #e8e2d9;border-radius:10px;padding:14px;margin-bottom:10px}
.workout-title{font-size:14px;font-weight:600;margin-bottom:2px}
.workout-focus{font-size:11px;color:#6b6560;margin-bottom:12px}
.ex-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #f0ebe3;font-size:13px}
.ex-row:last-of-type{border-bottom:none}
.ex-check{width:16px;height:16px;cursor:pointer;accent-color:#5a7a2a}
.ex-name{flex:1}
.ex-done{text-decoration:line-through;color:#bbb}
.ex-sets{font-size:11px;color:#6b6560;min-width:60px;text-align:right}
.badge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600}
.badge-done{background:#eaf3de;color:#3b6d11}
.badge-todo{background:#f5f0e8;color:#6b6560}
.notes-row{display:flex;gap:6px;margin-top:12px}
.notes-row input{flex:1;font-size:12px;padding:6px 8px;border:1px solid #e8e2d9;border-radius:6px;font-family:inherit}
.supp-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #f0ebe3}
.supp-row:last-of-type{border-bottom:none}
.supp-check{width:18px;height:18px;cursor:pointer;accent-color:#5a7a2a;flex-shrink:0}
.supp-name{font-size:13px;font-weight:500;flex:1}
.supp-detail{font-size:11px;color:#6b6560}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ebe3;font-size:12px}
.hist-row:last-of-type{border-bottom:none}
.hist-date{color:#6b6560;min-width:64px;font-size:11px}
.hist-bar-wrap{flex:1}
.hist-bar-bg{height:5px;background:#f0ebe3;border-radius:3px;overflow:hidden;margin-top:3px}
.hist-bar-fill{height:100%;border-radius:3px}
.rest-day{text-align:center;padding:32px 16px;color:#6b6560;font-size:13px}
.rest-title{font-size:1.1rem;font-weight:600;color:#1a1a1a;margin-bottom:8px;font-family:Georgia,serif}
select option[disabled]{color:#aaa}
</style>
</head>
<body>
<div class="dash">
  <h1>Fitness Dashboard</h1>
  <p class="subtitle">David Lloyd · Tue / Wed / Thu · Recomposition · 83kg</p>

  <div class="tabs">
    <button class="tab active" onclick="showTab('today',this)">Today</button>
    <button class="tab" onclick="showTab('workout',this)">Workout</button>
    <button class="tab" onclick="showTab('supplements',this)">Supplements</button>
    <button class="tab" onclick="showTab('history',this)">History</button>
  </div>

  <!-- TODAY -->
  <div class="panel active" id="tab-today">
    <div class="date-nav">
      <button onclick="changeDate(-1)">&#8592;</button>
      <div class="date-label" id="dateLabel"></div>
      <button onclick="changeDate(1)">&#8594;</button>
    </div>
    <div class="metrics">
      <div class="metric"><div class="metric-label">Calories</div><div class="metric-val" id="m-cal">0<span>/2540</span></div></div>
      <div class="metric"><div class="metric-label">Protein</div><div class="metric-val" id="m-pro">0g<span>/166g</span></div></div>
      <div class="metric"><div class="metric-label">Carbs</div><div class="metric-val" id="m-carb">0g</div></div>
      <div class="metric"><div class="metric-label">Fat</div><div class="metric-val" id="m-fat">0g</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill prog-green" id="cal-bar" style="width:0%"></div></div>
    <div class="remain-row">
      <span id="cal-remain">2540 kcal remaining</span>
      <span id="pro-remain">166g protein remaining</span>
    </div>
    <div id="meals-container"></div>
  </div>

  <!-- WORKOUT -->
  <div class="panel" id="tab-workout">
    <div class="date-nav">
      <button onclick="changeDate(-1)">&#8592;</button>
      <div class="date-label" id="wDateLabel"></div>
      <button onclick="changeDate(1)">&#8594;</button>
    </div>
    <div id="workout-container"></div>
  </div>

  <!-- SUPPLEMENTS -->
  <div class="panel" id="tab-supplements">
    <div class="date-nav">
      <button onclick="changeDate(-1)">&#8592;</button>
      <div class="date-label" id="sDateLabel"></div>
      <button onclick="changeDate(1)">&#8594;</button>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Daily supplements</div></div>
      <div id="supp-list"></div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Protein shakes</div><div class="card-sub" id="shake-total"></div></div>
      <div id="shake-list"></div>
      <div class="add-row" style="margin-top:10px">
        <select id="shake-size">
          <option value="1">1 scoop (~25g protein · 110 kcal)</option>
          <option value="2" selected>2 scoops (~50g protein · 220 kcal)</option>
          <option value="3">3 scoops (~75g protein · 330 kcal)</option>
        </select>
        <button class="add-btn" onclick="logShake()">Log shake</button>
      </div>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="tab-history">
    <div class="card">
      <div class="card-header"><div class="card-title">Last 14 days</div></div>
      <div id="history-list"></div>
    </div>
    <div class="card" style="margin-top:10px">
      <div class="card-header"><div class="card-title">Your most logged foods</div><div class="card-sub">Tap to add quickly</div></div>
      <div id="frequent-list"></div>
    </div>
  </div>
</div>

<script>
var GOALS={cal:2540,protein:166,carbs:220,fat:80};
var MEALS=['Breakfast','Lunch','Dinner','Snacks'];

var FOODS=[
  {name:'Oats 200g + semi skimmed milk',cal:370,protein:18,carbs:58,fat:7},
  {name:'Grenade Oreo protein bar',cal:236,protein:20,carbs:23,fat:8},
  {name:'Chicken wrap (this one)',cal:349,protein:25,carbs:45,fat:7},
  {name:'Chicken breast 200g',cal:220,protein:46,carbs:0,fat:5},
  {name:'Chicken breast 300g',cal:330,protein:69,carbs:0,fat:7},
  {name:'Lean beef mince 200g',cal:280,protein:40,carbs:0,fat:14},
  {name:'Salmon fillet 200g',cal:310,protein:42,carbs:0,fat:16},
  {name:'Eggs x2 scrambled',cal:180,protein:14,carbs:2,fat:13},
  {name:'Eggs x4 scrambled',cal:360,protein:28,carbs:4,fat:26},
  {name:'White rice 150g cooked',cal:195,protein:4,carbs:43,fat:1},
  {name:'Sweet potato 200g',cal:172,protein:3,carbs:40,fat:0},
  {name:'Pasta 100g dry',cal:350,protein:12,carbs:70,fat:2},
  {name:'Bread 2 slices',cal:180,protein:7,carbs:34,fat:2},
  {name:'Fage 0% Greek yogurt 200g',cal:120,protein:20,carbs:6,fat:0},
  {name:'Cottage cheese 200g',cal:180,protein:24,carbs:6,fat:6},
  {name:'Banana',cal:90,protein:1,carbs:23,fat:0},
  {name:'Apple',cal:80,protein:0,carbs:21,fat:0},
  {name:'Almonds 30g',cal:180,protein:6,carbs:5,fat:16},
  {name:'Broccoli 200g',cal:68,protein:6,carbs:10,fat:1},
  {name:'Sugar free Red Bull',cal:8,protein:0,carbs:1,fat:0},
  {name:'PBN Whey 1 scoop',cal:110,protein:25,carbs:4,fat:2},
  {name:'PBN Whey 2 scoops',cal:220,protein:50,carbs:8,fat:4},
];

var WORKOUTS={
  2:{name:'Tuesday — Push',focus:'Chest · Shoulders · Triceps',exercises:[
    {name:'Flat dumbbell bench press',sets:'4×8'},
    {name:'Incline dumbbell press',sets:'3×10'},
    {name:'Cable chest fly',sets:'3×12'},
    {name:'Seated dumbbell shoulder press',sets:'3×10'},
    {name:'Lateral raises',sets:'3×15'},
    {name:'Cable tricep pushdown',sets:'3×12'},
  ]},
  3:{name:'Wednesday — Pull',focus:'Back · Biceps',exercises:[
    {name:'Seated cable row',sets:'4×10'},
    {name:'Lat pulldown',sets:'4×10'},
    {name:'Single-arm dumbbell row',sets:'3×10 each'},
    {name:'Face pulls',sets:'3×15'},
    {name:'Incline dumbbell curl',sets:'3×10'},
    {name:'Cable curl',sets:'3×12'},
  ]},
  4:{name:'Thursday — Legs + Core',focus:'Legs · Glutes · Abs',exercises:[
    {name:'Leg press',sets:'4×10'},
    {name:'Goblet squat',sets:'3×12'},
    {name:'Romanian deadlift',sets:'3×10'},
    {name:'Dumbbell walking lunges',sets:'3×10 each'},
    {name:'Cable crunch',sets:'3×15'},
    {name:'Plank',sets:'3×45s'},
  ]},
};

var SUPPS=[
  {name:'Creatine monohydrate',detail:'5 tablets (5g) — any time',key:'creatine'},
  {name:'Vitamin D3 + K2',detail:'4000 IU — with food',key:'vitd'},
];

var currentDate=new Date();currentDate.setHours(0,0,0,0);

function dk(d){return d.toISOString().slice(0,10)}
function load(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch(e){return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function getDayLog(){return load('log_'+dk(currentDate),{meals:{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]}})}
function saveDayLog(l){save('log_'+dk(currentDate),l)}
function getWLog(){return load('wlog_'+dk(currentDate),{})}
function saveWLog(w){save('wlog_'+dk(currentDate),w)}
function getSLog(){return load('slog_'+dk(currentDate),{})}
function saveSLog(s){save('slog_'+dk(currentDate),s)}

function fmtDate(d){
  var today=new Date();today.setHours(0,0,0,0);
  var diff=Math.round((d-today)/86400000);
  if(diff===0)return'Today';if(diff===-1)return'Yesterday';if(diff===1)return'Tomorrow';
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function changeDate(delta){
  currentDate=new Date(currentDate.getTime()+delta*86400000);
  render();
}

function totals(log){
  var cal=0,protein=0,carbs=0,fat=0;
  MEALS.forEach(function(m){(log.meals[m]||[]).forEach(function(f){cal+=f.cal;protein+=f.protein;carbs+=f.carbs;fat+=f.fat});});
  return{cal:cal,protein:protein,carbs:carbs,fat:fat};
}

function pct(v,max){return Math.min(100,Math.round(v/max*100))}

function showTab(id,btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('tab-'+id).classList.add('active');
  btn.classList.add('active');
}

function render(){
  var dl=fmtDate(currentDate);
  document.getElementById('dateLabel').textContent=dl;
  document.getElementById('wDateLabel').textContent=dl;
  document.getElementById('sDateLabel').textContent=dl;
  renderToday();renderWorkout();renderSupplements();renderHistory();
}

function renderToday(){
  var log=getDayLog();var t=totals(log);
  document.getElementById('m-cal').innerHTML=Math.round(t.cal)+'<span>/2540</span>';
  document.getElementById('m-pro').innerHTML=Math.round(t.protein)+'g<span>/166g</span>';
  document.getElementById('m-carb').innerHTML=Math.round(t.carbs)+'g';
  document.getElementById('m-fat').innerHTML=Math.round(t.fat)+'g';
  var cp=pct(t.cal,GOALS.cal);
  var bar=document.getElementById('cal-bar');
  bar.style.width=cp+'%';
  bar.className='prog-fill '+(cp>=100?'prog-red':cp>=80?'prog-amber':'prog-green');
  document.getElementById('cal-remain').textContent=Math.max(0,GOALS.cal-Math.round(t.cal))+' kcal remaining';
  document.getElementById('pro-remain').textContent=Math.max(0,GOALS.protein-Math.round(t.protein))+'g protein remaining';
  var c=document.getElementById('meals-container');c.innerHTML='';
  MEALS.forEach(function(meal){
    var items=log.meals[meal]||[];
    var mCal=items.reduce(function(a,f){return a+f.cal},0);
    var mPro=items.reduce(function(a,f){return a+f.protein},0);
    var div=document.createElement('div');div.className='card';
    var html='<div class="card-header"><div class="card-title">'+meal+'</div><div class="card-sub">'+Math.round(mCal)+' kcal &middot; '+Math.round(mPro)+'g protein</div></div>';
    if(items.length===0)html+='<div class="empty">Nothing logged yet</div>';
    items.forEach(function(f,i){
      html+='<div class="food-row"><div class="food-name">'+f.name+'</div><div class="food-macros">'+Math.round(f.cal)+' kcal<br>'+Math.round(f.protein)+'g P &middot; '+Math.round(f.carbs)+'g C &middot; '+Math.round(f.fat)+'g F</div><button class="del-btn" onclick="removeFood(\''+meal+'\','+i+')">&#x2715;</button></div>';
    });
    var opts=FOODS.map(function(f){return'<option value="'+encodeURIComponent(JSON.stringify(f))+'">'+f.name+'</option>'}).join('');
    html+='<div class="add-area"><div class="add-row"><select id="sel-'+meal+'"><option value="" disabled selected>— choose food —</option>'+opts+'<option value="custom">+ Enter custom food...</option></select><button class="add-btn" onclick="addFromSel(\''+meal+'\')">Add</button></div>';
    var recents=getRecents(meal);
    if(recents.length>0){
      html+='<div class="quick-row">'+recents.slice(0,5).map(function(f){return'<button class="quick-btn" onclick="quickAdd(\''+meal+'\',\''+encodeURIComponent(JSON.stringify(f))+'\')">'+f.name.slice(0,24)+(f.name.length>24?'…':'')+'</button>'}).join('')+'</div>';
    }
    html+='</div>';
    div.innerHTML=html;c.appendChild(div);
  });
}

function getRecents(meal){
  var all=[];
  for(var i=1;i<=21;i++){
    var d=new Date(currentDate.getTime()-i*86400000);
    var log=load('log_'+dk(d),{meals:{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]}});
    (log.meals[meal]||[]).forEach(function(f){if(!all.find(function(x){return x.name===f.name}))all.push(f)});
  }
  return all.slice(0,6);
}

function addFromSel(meal){
  var sel=document.getElementById('sel-'+meal);var val=sel.value;if(!val)return;
  if(val==='custom'){
    var name=prompt('Food name:');if(!name)return;
    var cal=parseInt(prompt('Calories?')||0);
    var protein=parseInt(prompt('Protein (g)?')||0);
    var carbs=parseInt(prompt('Carbs (g)?')||0);
    var fat=parseInt(prompt('Fat (g)?')||0);
    addFood(meal,{name:name,cal:cal,protein:protein,carbs:carbs,fat:fat});
  } else {
    addFood(meal,JSON.parse(decodeURIComponent(val)));
  }
  sel.value='';
}

function quickAdd(meal,enc){addFood(meal,JSON.parse(decodeURIComponent(enc)))}

function addFood(meal,food){
  var log=getDayLog();
  if(!log.meals[meal])log.meals[meal]=[];
  log.meals[meal].push(food);
  saveDayLog(log);render();
}

function removeFood(meal,idx){
  var log=getDayLog();log.meals[meal].splice(idx,1);saveDayLog(log);render();
}

function renderWorkout(){
  var dow=currentDate.getDay();
  var wlog=getWLog();
  var c=document.getElementById('workout-container');
  if(!WORKOUTS[dow]){
    c.innerHTML='<div class="workout-card"><div class="rest-title">Rest day</div><div class="rest-day">No gym session today.<br>Focus on hitting protein target and staying at maintenance calories.</div></div>';
    return;
  }
  var w=WORKOUTS[dow];
  var exLog=wlog.exercises||{};
  var doneCount=w.exercises.filter(function(_,i){return!!exLog[i]}).length;
  var allDone=doneCount===w.exercises.length;
  var html='<div class="workout-card"><div class="card-header"><div><div class="workout-title">'+w.name+'</div><div class="workout-focus">'+w.focus+'</div></div><span class="badge '+(allDone?'badge-done':'badge-todo')+'">'+(allDone?'Complete':doneCount+' / '+w.exercises.length)+'</span></div>';
  w.exercises.forEach(function(ex,i){
    var done=!!exLog[i];
    html+='<div class="ex-row"><input type="checkbox" class="ex-check"'+(done?' checked':'')+' onchange="toggleEx('+i+',this.checked)"><div class="ex-name'+(done?' ex-done':'')+'">'+ex.name+'</div><div class="ex-sets">'+ex.sets+'</div></div>';
  });
  html+='<div class="notes-row"><input type="text" id="wnotes" placeholder="Notes — weights used, how it felt..." value="'+(wlog.notes||'')+'"><button class="add-btn" onclick="saveNotes()">Save</button></div></div>';
  c.innerHTML=html;
}

function toggleEx(idx,done){
  var wlog=getWLog();if(!wlog.exercises)wlog.exercises={};
  if(done)wlog.exercises[idx]=true;else delete wlog.exercises[idx];
  saveWLog(wlog);renderWorkout();
}

function saveNotes(){
  var wlog=getWLog();wlog.notes=document.getElementById('wnotes').value;saveWLog(wlog);renderWorkout();
}

function renderSupplements(){
  var slog=getSLog();
  var html='';
  SUPPS.forEach(function(s){
    html+='<div class="supp-row"><input type="checkbox" class="supp-check"'+(slog[s.key]?' checked':'')+' onchange="toggleSupp(\''+s.key+'\',this.checked)"><div class="supp-name">'+s.name+'</div><div class="supp-detail">'+s.detail+'</div></div>';
  });
  document.getElementById('supp-list').innerHTML=html;
  var shakes=slog.shakes||[];
  var totalShakePro=shakes.reduce(function(a,s){return a+s.protein},0);
  document.getElementById('shake-total').textContent=shakes.length>0?totalShakePro+'g protein today':'';
  var shakeHtml=shakes.length===0?'<div class="empty">No shakes logged yet</div>':'';
  shakes.forEach(function(sh,i){
    shakeHtml+='<div class="food-row"><div class="food-name">PBN Whey — '+sh.scoops+' scoop'+(sh.scoops>1?'s':'')+'</div><div class="food-macros">'+sh.cal+' kcal &middot; '+sh.protein+'g protein</div><button class="del-btn" onclick="removeShake('+i+')">&#x2715;</button></div>';
  });
  document.getElementById('shake-list').innerHTML=shakeHtml;
}

function toggleSupp(key,val){var slog=getSLog();slog[key]=val;saveSLog(slog);renderSupplements();}

function logShake(){
  var scoops=parseInt(document.getElementById('shake-size').value);
  var shake={scoops:scoops,cal:scoops*110,protein:scoops*25,carbs:scoops*4,fat:scoops*2};
  var slog=getSLog();if(!slog.shakes)slog.shakes=[];slog.shakes.push(shake);saveSLog(slog);
  var log=getDayLog();if(!log.meals.Snacks)log.meals.Snacks=[];
  log.meals.Snacks.push({name:'PBN Whey '+scoops+' scoop'+(scoops>1?'s':''),cal:shake.cal,protein:shake.protein,carbs:shake.carbs,fat:shake.fat});
  saveDayLog(log);renderSupplements();renderToday();
}

function removeShake(idx){
  var slog=getSLog();slog.shakes.splice(idx,1);saveSLog(slog);renderSupplements();
}

function renderHistory(){
  var days=[];
  for(var i=1;i<=14;i++){
    var d=new Date(currentDate.getTime()-i*86400000);
    var log=load('log_'+dk(d),null);
    if(log){var t=totals(log);if(t.cal>0)days.push({d:d,t:t});}
  }
  var histHtml=days.length===0?'<div class="empty">No history yet — start logging today</div>':'';
  days.forEach(function(item){
    var cp=pct(item.t.cal,GOALS.cal);
    var pp=pct(item.t.protein,GOALS.protein);
    var col=cp>=100?'#c0392b':cp>=80?'#c8922a':'#5a7a2a';
    histHtml+='<div class="hist-row"><div class="hist-date">'+item.d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'})+'</div><div class="hist-bar-wrap"><div style="display:flex;justify-content:space-between;font-size:11px"><span>'+Math.round(item.t.cal)+' kcal</span><span style="color:#6b6560">'+Math.round(item.t.protein)+'g protein</span></div><div class="hist-bar-bg"><div class="hist-bar-fill" style="width:'+cp+'%;background:'+col+'"></div></div></div></div>';
  });
  document.getElementById('history-list').innerHTML=histHtml;

  var freq={};
  for(var j=0;j<30;j++){
    var d2=new Date(currentDate.getTime()-j*86400000);
    var log2=load('log_'+dk(d2),{meals:{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]}});
    MEALS.forEach(function(m){(log2.meals[m]||[]).forEach(function(f){freq[f.name]=(freq[f.name]||{count:0,food:f});freq[f.name].count++;});});
  }
  var sorted=Object.values(freq).sort(function(a,b){return b.count-a.count}).slice(0,8);
  var freqHtml=sorted.length===0?'<div class="empty">Will populate as you log food</div>':
    sorted.map(function(item){
      return'<div class="hist-row"><div style="flex:1;font-size:13px">'+item.food.name+'</div><div style="font-size:11px;color:#6b6560;margin-right:10px">'+item.count+'x logged</div><button class="quick-btn" onclick="addFrequent(\''+encodeURIComponent(JSON.stringify(item.food))+'\')">+ Add</button></div>';
    }).join('');
  document.getElementById('frequent-list').innerHTML=freqHtml;
}

function addFrequent(enc){
  var food=JSON.parse(decodeURIComponent(enc));
  var meal=prompt('Add to which meal?\n1 = Breakfast\n2 = Lunch\n3 = Dinner\n4 = Snacks','2');
  var mealName=MEALS[parseInt(meal)-1];
  if(mealName){addFood(mealName,food);showTab('today',document.querySelectorAll('.tab')[0]);}
}

render();
</script>
</body>
